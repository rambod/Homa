[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2026-0097",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
